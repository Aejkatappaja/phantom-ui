<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>phantom-ui playground</title>
<script src="../dist/phantom-ui.cdn.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #1a1b26;
    color: #c0caf5;
    padding: 24px;
    min-height: 100vh;
  }

  h1 { font-size: 20px; margin-bottom: 24px; font-weight: 600; }

  .layout {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    align-items: flex-start;
  }

  .controls {
    background: #24283b;
    border-radius: 8px;
    padding: 20px;
    min-width: 280px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .controls label {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 13px;
    color: #7982a9;
  }

  .controls label span { font-family: monospace; color: #c0caf5; }

  .controls input[type="range"],
  .controls input[type="text"],
  .controls select {
    background: #1a1b26;
    border: 1px solid #3b4261;
    border-radius: 4px;
    color: #c0caf5;
    padding: 4px 8px;
    font-size: 13px;
  }

  .controls input[type="checkbox"] { width: 16px; height: 16px; }
  .controls .row { display: flex; align-items: center; gap: 8px; }

  .preview { flex: 1; min-width: 320px; }

  .card {
    background: #24283b;
    border-radius: 12px;
    padding: 20px;
    width: 320px;
  }

  .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .avatar { width: 48px; height: 48px; border-radius: 50%; background: #3b4261; }
  .card-header-text h3 { font-size: 16px; margin-bottom: 4px; }
  .card-header-text p { font-size: 13px; color: #7982a9; }
  .card-body p { font-size: 14px; line-height: 1.5; margin-bottom: 8px; }
  .card-footer { display: flex; gap: 8px; margin-top: 12px; }
  .tag { background: #3b4261; padding: 4px 10px; border-radius: 12px; font-size: 12px; }

  .note-ignore { font-size: 11px; color: #e94560; margin-top: 8px; }
  .note-no-children { font-size: 11px; color: #4ecca3; margin-top: 4px; }

  .card-actions { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
  .demo-btn {
    background: #3b4261; color: #c0caf5; border: 1px solid #565f89;
    border-radius: 6px; padding: 6px 12px; font: inherit; font-size: 13px; cursor: pointer;
  }
  .demo-btn:focus-visible, .demo-link:focus-visible { outline: 2px solid #7aa2f7; outline-offset: 2px; }
  .demo-link { color: #7aa2f7; font-size: 13px; }

  /* Icon drawn via CSS mask-image + background tint (not <img>/<svg>): exercises
     phantom-ui's runtime masked-graphic detection. */
  .mask-icon {
    display: inline-block; width: 20px; height: 20px; background: #7aa2f7;
    -webkit-mask: var(--icon) center / contain no-repeat;
    mask: var(--icon) center / contain no-repeat;
    --icon: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/></svg>');
  }

  .controls label small { color: #565f89; }
</style>
</head>
<body>
  <h1>phantom-ui playground</h1>

  <div class="layout">
    <div class="controls">
      <label>
        <div class="row">
          <input type="checkbox" id="ctl-loading" checked>
          <span>loading</span>
        </div>
      </label>

      <label>
        <div class="row">
          <input type="checkbox" id="ctl-debug">
          <span>debug</span>
        </div>
      </label>

      <label>
        <span>animation</span>
        <select id="ctl-animation">
          <option value="shimmer" selected>shimmer</option>
          <option value="pulse">pulse</option>
          <option value="breathe">breathe</option>
          <option value="solid">solid</option>
        </select>
      </label>

      <label>
        <span>shimmer-direction <small>(shimmer mode)</small></span>
        <select id="ctl-shimmer-direction">
          <option value="ltr" selected>ltr</option>
          <option value="rtl">rtl</option>
          <option value="ttb">ttb</option>
          <option value="btt">btt</option>
        </select>
      </label>

      <label>
        <span>duration <output id="out-duration">1.5</output>s</span>
        <input type="range" id="ctl-duration" min="0.3" max="5" step="0.1" value="1.5">
      </label>

      <label>
        <span>stagger <output id="out-stagger">0</output>s</span>
        <input type="range" id="ctl-stagger" min="0" max="0.5" step="0.01" value="0">
      </label>

      <label>
        <span>reveal <output id="out-reveal">0</output>s</span>
        <input type="range" id="ctl-reveal" min="0" max="2" step="0.1" value="0">
      </label>

      <label>
        <span>count <output id="out-count">1</output></span>
        <input type="range" id="ctl-count" min="1" max="6" step="1" value="1">
      </label>

      <label>
        <span>count-gap <output id="out-count-gap">0</output>px</span>
        <input type="range" id="ctl-count-gap" min="0" max="40" step="1" value="0">
      </label>

      <label>
        <span>fallback-radius <output id="out-fallback-radius">4</output>px</span>
        <input type="range" id="ctl-fallback-radius" min="0" max="20" step="1" value="4">
      </label>

      <label>
        <span>shimmer-color</span>
        <div class="row">
          <input type="color" id="ctl-shimmer-color" value="#808080">
          <input type="range" id="ctl-shimmer-alpha" min="0" max="1" step="0.05" value="0.3">
          <output id="out-shimmer-alpha">0.3</output>
        </div>
      </label>

      <label>
        <span>background-color</span>
        <div class="row">
          <input type="color" id="ctl-bg-color" value="#808080">
          <input type="range" id="ctl-bg-alpha" min="0" max="1" step="0.01" value="0.2">
          <output id="out-bg-alpha">0.2</output>
        </div>
      </label>

      <label>
        <span>loading-label <small>(screen reader)</small></span>
        <input type="text" id="ctl-loading-label" value="Loading">
      </label>
    </div>

    <div class="preview">
      <phantom-ui id="target" loading>
        <div class="card">
          <div class="card-header">
            <div class="avatar"></div>
            <div class="card-header-text">
              <h3>Jane Doe <span class="mask-icon" role="img" aria-label="verified"></span></h3>
              <p>Software Engineer</p>
            </div>
          </div>
          <div class="card-body">
            <p>Building accessible, performant interfaces for the modern web.</p>
          </div>
          <div class="card-footer">
            <span class="tag">TypeScript</span>
            <span class="tag">Lit</span>
            <span class="tag">CSS</span>
          </div>
          <div class="card-actions">
            <button class="demo-btn" type="button">Follow</button>
            <a class="demo-link" href="#x">Profile</a>
            <button class="demo-btn" type="button" data-shimmer-ignore>Close (kept)</button>
          </div>
          <p class="note-ignore" data-shimmer-ignore>data-shimmer-ignore (always visible)</p>
          <div class="note-no-children" data-shimmer-no-children>
            <span>data-shimmer-no-children</span>
            <span>(single block)</span>
          </div>
        </div>
      </phantom-ui>
    </div>
  </div>

  <script>
    const el = document.getElementById("target");

    document.getElementById("ctl-loading").addEventListener("change", (e) => {
      el.loading = e.target.checked;
    });

    document.getElementById("ctl-animation").addEventListener("change", (e) => {
      el.setAttribute("animation", e.target.value);
    });

    document.getElementById("ctl-shimmer-direction").addEventListener("change", (e) => {
      el.setAttribute("shimmer-direction", e.target.value);
    });

    document.getElementById("ctl-debug").addEventListener("change", (e) => {
      el.toggleAttribute("debug", e.target.checked);
    });

    document.getElementById("ctl-loading-label").addEventListener("input", (e) => {
      el.setAttribute("loading-label", e.target.value);
    });

    const ranges = [
      ["ctl-duration",        "out-duration",        (v) => { el.duration = Number(v); }],
      ["ctl-stagger",         "out-stagger",         (v) => { el.stagger = Number(v); }],
      ["ctl-reveal",          "out-reveal",          (v) => { el.reveal = Number(v); }],
      ["ctl-count",           "out-count",           (v) => { el.count = Number(v); }],
      ["ctl-count-gap",       "out-count-gap",       (v) => { el.setAttribute("count-gap", v); }],
      ["ctl-fallback-radius", "out-fallback-radius", (v) => { el.fallbackRadius = Number(v); }],
    ];

    for (const [inputId, outputId, apply] of ranges) {
      const input = document.getElementById(inputId);
      const output = document.getElementById(outputId);
      input.addEventListener("input", (e) => {
        output.textContent = e.target.value;
        apply(e.target.value);
      });
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function wireColor(colorId, alphaId, outputId, attr) {
      const color = document.getElementById(colorId);
      const alpha = document.getElementById(alphaId);
      const output = document.getElementById(outputId);
      const update = () => {
        output.textContent = alpha.value;
        el.setAttribute(attr, hexToRgba(color.value, alpha.value));
      };
      color.addEventListener("input", update);
      alpha.addEventListener("input", update);
    }

    wireColor("ctl-shimmer-color", "ctl-shimmer-alpha", "out-shimmer-alpha", "shimmer-color");
    wireColor("ctl-bg-color", "ctl-bg-alpha", "out-bg-alpha", "background-color");
  </script>
</body>
</html>
