<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <!-- Skeleton dude -->
  <g transform="translate(20, 8)">
    <!-- Skull -->
    <rect x="16" y="0" width="28" height="28" rx="10" fill="#e0e0e0"/>
    <!-- Eyes - blink -->
    <circle cx="26" cy="12" r="3" fill="#1a1a2e">
      <animate attributeName="ry" values="3;0.5;3" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="38" cy="12" r="3" fill="#1a1a2e">
      <animate attributeName="ry" values="3;0.5;3" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Mouth -->
    <rect x="24" y="20" width="4" height="2" rx="1" fill="#1a1a2e"/>
    <rect x="30" y="20" width="4" height="2" rx="1" fill="#1a1a2e"/>
    <rect x="36" y="20" width="4" height="2" rx="1" fill="#1a1a2e"/>

    <!-- Spine -->
    <rect x="28" y="30" width="4" height="6" rx="2" fill="#e0e0e0"/>
    <rect x="28" y="38" width="4" height="6" rx="2" fill="#e0e0e0"/>
    <rect x="28" y="46" width="4" height="6" rx="2" fill="#e0e0e0"/>

    <!-- Ribs -->
    <rect x="16" y="32" width="28" height="3" rx="1.5" fill="#c0c0c0"/>
    <rect x="18" y="38" width="24" height="3" rx="1.5" fill="#c0c0c0"/>
    <rect x="18" y="44" width="24" height="3" rx="1.5" fill="#c0c0c0"/>

    <!-- Left arm waving -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0 16 33;-15 16 33;0 16 33;10 16 33;0 16 33" dur="1.8s" repeatCount="indefinite"/>
      <!-- Upper arm -->
      <line x1="16" y1="33" x2="4" y2="22" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>
      <!-- Forearm waving -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="0 4 22;20 4 22;0 4 22;-15 4 22;0 4 22" dur="1.8s" repeatCount="indefinite"/>
        <line x1="4" y1="22" x2="8" y2="8" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>
        <circle cx="8" cy="7" r="2.5" fill="#e0e0e0"/>
      </g>
    </g>

    <!-- Right arm pointing at shimmer blocks -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0 44 33;-3 44 33;0 44 33;3 44 33;0 44 33" dur="2.5s" repeatCount="indefinite"/>
      <line x1="44" y1="33" x2="56" y2="42" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>
      <line x1="56" y1="42" x2="68" y2="38" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>
      <circle cx="69" cy="37" r="2.5" fill="#e0e0e0"/>
    </g>

    <!-- Pelvis -->
    <rect x="18" y="54" width="24" height="6" rx="3" fill="#e0e0e0"/>

    <!-- Left leg -->
    <line x1="24" y1="60" x2="22" y2="76" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>
    <line x1="22" y1="76" x2="20" y2="90" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="90" x2="14" y2="90" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>

    <!-- Right leg -->
    <line x1="36" y1="60" x2="38" y2="76" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>
    <line x1="38" y1="76" x2="40" y2="90" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="90" x2="48" y2="90" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>

    <!-- Body bob -->
    <animateTransform attributeName="transform" type="translate" values="20 8;20 6;20 8;20 10;20 8" dur="1.8s" repeatCount="indefinite"/>
  </g>

  <!-- Shimmer blocks the skeleton is "painting" -->
  <g transform="translate(110, 15)">
    <!-- Card outline -->
    <rect x="0" y="0" width="150" height="90" rx="8" fill="none" stroke="#2a2a4e" stroke-width="1.5" stroke-dasharray="4 3"/>

    <!-- Shimmer block: avatar circle -->
    <circle cx="24" cy="24" r="14" fill="#2a2a5e">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="1.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Shimmer block: title -->
    <rect x="48" y="12" width="80" height="10" rx="3" fill="#2a2a5e">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="1.5s" begin="0.15s" repeatCount="indefinite"/>
    </rect>

    <!-- Shimmer block: subtitle -->
    <rect x="48" y="28" width="56" height="8" rx="3" fill="#2a2a5e">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </rect>

    <!-- Shimmer block: body line 1 -->
    <rect x="12" y="52" width="126" height="8" rx="3" fill="#2a2a5e">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="1.5s" begin="0.45s" repeatCount="indefinite"/>
    </rect>

    <!-- Shimmer block: body line 2 -->
    <rect x="12" y="66" width="90" height="8" rx="3" fill="#2a2a5e">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Text -->
  <text x="280" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#e0e0e0">shimmer</text>
  <text x="280" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#8899aa">skeleton</text>
</svg>
